<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighthouse - Thiết kế lộ trình</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e6f9f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            width: 850px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #111;
            margin-bottom: 40px;
            line-height: 1.4;
            font-weight: bold;
            font-style: italic;
        }

        .content-layout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }

        .left-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .circle-placeholder {
            width: 240px;
            height: 240px;
            background-color: #d9d9d9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .user-welcome {
            font-size: 20px;
            font-weight: bold;
            font-style: italic;
            color: #000;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .right-side {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            background-color: #d9d9d9;
            border-radius: 8px;
            box-sizing: border-box;
            color: #000;
            font-weight: bold;
            font-style: italic;
        }

        .input-field::placeholder {
            color: #444;
            font-weight: bold;
            font-style: italic;
        }

        .btn-submit {
            width: 200px;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            font-style: italic;
            border: none;
            background-color: #cccccc;
            color: #000;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #b5b5b5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Thiết kế lộ trình vào<br>Đại học mong muốn của bạn</h1>
        
        <div class="content-layout">
            <div class="left-side">
                <div class="circle-placeholder">
                    <svg viewBox="0 0 100 100" width="100%" height="100%">
                        <circle cx="50" cy="38" r="16" fill="#555555" />
                        <path d="M22 82 C22 62, 32 54, 50 54 C68 54, 78 62, 78 82 Z" fill="#555555" />
                    </svg>
                </div>
                <div class="user-welcome">Xin chào User1!</div>
                <button class="btn-submit" onclick="nextScreen()">Tạo lộ trình</button>
            </div>

            <div class="right-side">
                <input type="text" id="txtTruong" class="input-field" placeholder="Ngôi trường mục tiêu của bạn">
                <input type="text" id="txtTheManh" class="input-field" placeholder="Thế mạnh của bạn">
                <input type="text" id="txtDiemSo" class="input-field" placeholder="Điểm số trung bình của năm học">
            </div>
        </div>
    </div>

    <script>
        function nextScreen() {
            // Lấy dữ liệu người dùng vừa gõ
            var truong = document.getElementById("txtTruong").value || "Đại học mong muốn";
            var themanh = document.getElementById("txtTheManh").value || "Chưa xác định";
            var diemso = document.getElementById("txtDiemSo").value || "0.0";

            // Lưu vào bộ nhớ tạm của trình duyệt (localStorage)
            localStorage.setItem("lighthouse_truong", truong);
            localStorage.setItem("lighthouse_themanh", themanh);
            localStorage.setItem("lighthouse_diemso", diemso);

            // Chuyển sang màn hình tiếp theo
            window.location.href = "manhinh2.html";
        }
    </script>

</body>
</html>
