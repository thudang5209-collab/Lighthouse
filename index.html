<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighthouse - Thiết kế lộ trình</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e6f9f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: white;
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            box-sizing: border-box;
            margin: 20px;
        }

        /* THƯƠNG HIỆU LIGHTHOUSE */
        .brand-header {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 900;
            font-style: italic;
            color: #2bc4ad;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin: 0;
        }

        .tagline {
            font-size: 14px;
            font-style: italic;
            color: #666;
            font-weight: 500;
            margin: 0;
        }

        .tagline::after {
            content: "";
            display: block;
            width: 50px;
            height: 2px;
            background-color: #88e2d3;
            margin: 8px auto 0;
            border-radius: 2px;
        }

        h1 {
            font-size: 28px;
            color: #111;
            margin-top: 10px;
            margin-bottom: 40px;
            line-height: 1.4;
            font-weight: bold;
        }

        .content-layout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }

        .left-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .circle-placeholder {
            width: 240px;
            height: 240px;
            background-color: #e0e0e0;
            border-radius: 50%;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .user-welcome {
            font-weight: bold;
            font-style: italic;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .right-side {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            background-color: #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            color: #333;
            font-weight: bold;
        }

        .input-field::placeholder {
            color: #555;
            font-weight: normal;
        }

        .btn-submit {
            width: 200px;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            background-color: #cccccc;
            color: #000;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #b5b5b5;
        }

        /* ĐIỆN THOẠI RESPONSIVE */
        @media (max-width: 768px) {
            .content-layout {
                flex-direction: column;
                gap: 30px;
            }
            .left-side, .right-side {
                width: 100%;
            }
            .circle-placeholder {
                width: 180px;
                height: 180px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-header">
            <p class="logo-text">Lighthouse</p>
            <p class="tagline">Ngọn hải đăng dẫn lối tới giảng đường ước mơ</p>
        </div>

        <h1>Thiết kế lộ trình vào<br>Đại học mong muốn của bạn</h1>
        
        <div class="content-layout">
            <div class="left-side">
                <div class="circle-placeholder">
                    <svg viewBox="0 0 24 24" fill="#4f5b66" style="width: 60%; height: 60%;">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <div class="user-welcome">Xin chào User1!</div>
                <button class="btn-submit" onclick="nextScreen()">Tạo lộ trình</button>
            </div>

            <div class="right-side">
                <input type="text" id="txtTruong" class="input-field" placeholder="Ngôi trường mục tiêu của bạn">
                <input type="text" id="txtTheManh" class="input-field" placeholder="Thế mạnh của bạn">
                <input type="text" id="txtDiem" class="input-field" placeholder="Điểm số trung bình của năm học">
            </div>
        </div>
    </div>

    <script>
        function nextScreen() {
            var truong = document.getElementById("txtTruong").value.trim();
            var themanh = document.getElementById("txtTheManh").value.trim();
            var diem = document.getElementById("txtDiem").value.trim();

            if (truong === "" || themanh === "") {
                alert("Bạn hãy điền đầy đủ mục tiêu và thế mạnh nhé!");
                return;
            }

            // Lưu dữ liệu vào trình duyệt
            localStorage.setItem("lighthouse_truong", truong);
            localStorage.setItem("lighthouse_themanh", themanh);
            localStorage.setItem("lighthouse_diem", diem);

            // Chuyển màn hình
            window.location.href = "manhinh2.html";
        }
    </script>
</body>
</html>
