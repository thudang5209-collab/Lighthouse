<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighthouse - Thiết kế lộ trình</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e6f9f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: white;
            width: 850px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            font-size: 32px;
            color: #111;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .content-layout {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }

        .left-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .circle-placeholder {
            width: 280px;
            height: 280px;
            background-color: #e0e0e0;
            border-radius: 50%;
            margin-bottom: 25px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23a0a0a0"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
            background-size: 50%;
            background-repeat: no-repeat;
            background-position: center;
        }

        .right-side {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            background-color: #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            color: #333;
            font-weight: 500;
        }

        .input-field::placeholder {
            color: #555;
        }

        .btn-submit {
            width: 200px;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            background-color: #cccccc;
            color: #000;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #b5b5b5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Thiết kế lộ trình vào<br>Đại học mong muốn của bạn</h1>
        
        <div class="content-layout">
            <div class="left-side">
                <div class="circle-placeholder"></div>
                <button class="btn-submit" onclick="nextScreen()">Tạo lộ trình</button>
            </div>

            <div class="right-side">
                <input type="text" id="targetSchool" class="input-field" placeholder="Ngôi trường mục tiêu của bạn">
                <input type="text" id="userStrength" class="input-field" placeholder="Thế mạnh của bạn">
                <input type="text" id="userGpa" class="input-field" placeholder="Điểm số trung bình của năm học">
            </div>
        </div>
    </div>

    <script>
        function nextScreen() {
            var schoolValue = document.getElementById("targetSchool").value.trim();
            var strengthValue = document.getElementById("userStrength").value.trim();
            
            if (schoolValue === "") {
                alert("Bạn ơi, hãy nhập tên ngôi trường mục tiêu của mình nhé!");
                return;
            }

            // Lưu dữ liệu thô vào localStorage
            localStorage.setItem("lighthouse_school", schoolValue);
            localStorage.setItem("lighthouse_strength", strengthValue || "Chưa cập nhật");

            // Chuyển hướng sang Màn hình 2
            window.location.href = "manhinh2.html";
        }
    </script>

</body>
</html>
