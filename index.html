<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lighthouse - Thiết kế lộ trình</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e6f9f5; /* Màu nền xanh pastel nhẹ nhàng */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: white;
            width: 100%;
            max-width: 850px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            box-sizing: border-box;
            margin: 20px;
        }

        h1 {
            font-size: 32px;
            color: #111;
            margin-bottom: 40px;
            line-height: 1.4;
            font-weight: bold;
        }

        /* --- SỬ DỤNG LƯỚI GRID ĐỂ PHÂN CHIA BỐ CỤC HOÀN HẢO --- */
        .content-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            grid-template-areas: 
                "avatar inputs"
                "button inputs";
            gap: 30px;
            align-items: center;
        }

        /* Vùng chứa Avatar */
        .avatar-area {
            grid-area: avatar;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .circle-placeholder {
            width: 240px;
            height: 240px;
            background-color: #e0e0e0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .user-welcome {
            font-weight: bold;
            font-style: italic;
            margin-top: 15px;
            font-size: 18px;
            color: #000;
        }

        /* Vùng chứa 3 ô nhập liệu */
        .inputs-area {
            grid-area: inputs;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: none;
            background-color: #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            color: #333;
            font-weight: bold;
        }

        .input-field::placeholder {
            color: #555;
            font-weight: normal;
        }

        /* Vùng chứa nút bấm */
        .button-area {
            grid-area: button;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .btn-submit {
            width: 200px;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            background-color: #cccccc;
            color: #000;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #b5b5b5;
        }

        /* ================= TỐI ƯU GIAO DIỆN TRÊN ĐIỆN THOẠI (RESPONSIVE) ================= */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 25px;
            }

            /* Chuyển lưới thành 1 cột dọc và sắp xếp thứ tự: Avatar -> Nhập liệu -> Nút bấm */
            .content-layout {
                grid-template-columns: 1fr;
                grid-template-areas: 
                    "avatar"
                    "inputs"
                    "button";
                gap: 25px;
            }

            .circle-placeholder {
                width: 180px;
                height: 180px;
            }

            .btn-submit {
                width: 100%; /* Trên điện thoại nút bấm sẽ dài ra bằng các ô nhập cho đẹp mắt */
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Thiết kế lộ trình vào<br>Đại học mong muốn của bạn</h1>
        
        <div class="content-layout">
            
            <div class="avatar-area">
                <div class="circle-placeholder">
                    <svg viewBox="0 0 24 24" fill="#4f5b66" style="width: 65%; height: 65%;">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33
